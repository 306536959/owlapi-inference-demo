<section id="section-query" class="section">
    <div class="row">
        <div class="col-12">
            <div class="card mb-3">
                <div class="card-header">
                    <span><i class="fas fa-search me-2"></i>SPARQL查询</span>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">选择仓库</label>
                        <select class="form-select" id="queryRepoSelect">
                            <option value="">-- 选择仓库 --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">查询类型</label>
                        <select class="form-select" id="queryType">
                            <option value="select">SELECT</option>
                            <option value="construct">CONSTRUCT</option>
                            <option value="ask">ASK</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">SPARQL语句</label>
                        <div class="code-editor">
                            <textarea id="sparqlQuery" placeholder="PREFIX rdf: &lt;http://www.w3.org/1999/02/22-rdf-syntax-ns#&gt;
PREFIX rdfs: &lt;http://www.w3.org/2000/01/rdf-schema#&gt;
PREFIX owl: &lt;http://www.w3.org/2002/07/owl#&gt;

SELECT ?s ?p ?o
WHERE {
  ?s ?p ?o
}
LIMIT 100">PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?s ?p ?o
WHERE {
  ?s ?p ?o
}
LIMIT 100</textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" onclick="executeQuery()">
                            <i class="fas fa-play me-2"></i>执行查询
                        </button>
                        <button class="btn btn-outline-secondary" onclick="clearQuery()">
                            <i class="fas fa-trash-alt me-2"></i>清空
                        </button>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">预设查询</label>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-sm btn-outline-info" onclick="loadPresetQuery('classes')">类</button>
                            <button class="btn btn-sm btn-outline-info" onclick="loadPresetQuery('properties')">属性</button>
                            <button class="btn btn-sm btn-outline-info" onclick="loadPresetQuery('individuals')">实例</button>
                            <button class="btn btn-sm btn-outline-info" onclick="loadPresetQuery('count')">统计</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-table me-2"></i>查询结果</span>
                    <button class="btn btn-sm btn-outline-secondary" onclick="copyResults()">
                        <i class="fas fa-copy me-1"></i>复制
                    </button>
                </div>
                <div class="card-body">
                    <div id="queryResults" class="results-panel" style="min-height: 520px;">
                        <pre class="text-muted">查询结果将显示在这里...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
