<section id="section-create-fedx" class="section">
    <div class="card">
        <div class="card-header">
            <span><i class="fas fa-share-nodes me-2"></i>创建FedX联邦仓库</span>
            <div>
                <button class="btn btn-sm btn-outline-primary me-2" onclick="loadRepositories(); refreshFedxMembers()">
                    <i class="fas fa-sync-alt me-1"></i>刷新仓库列表
                </button>
                <button class="btn btn-sm btn-success" onclick="createFedxRepositoryFromPage()">
                    <i class="fas fa-check me-1"></i>创建FedX
                </button>
            </div>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                <i class="fas fa-circle-info me-2"></i>
                选择多个已存在仓库作为联邦成员，系统会创建一个新的 FedX 仓库（用于跨仓库联邦查询）。
            </div>

            <div class="form-section">
                <h5><i class="fas fa-info-circle text-primary"></i>FedX 基本信息</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">仓库ID</label>
                        <input type="text" class="form-control" id="newFedxRepoId" placeholder="fedx_his">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">仓库标题</label>
                        <input type="text" class="form-control" id="newFedxRepoTitle" placeholder="联邦查询仓库">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h5><i class="fas fa-link text-primary"></i>联邦成员仓库</h5>
                <div class="mb-3">
                    <label class="form-label">可选成员（多选框）</label>
                    <div id="fedxMemberRepos" class="border rounded p-3" style="max-height: 320px; overflow: auto;">
                        <div class="text-muted">加载中...</div>
                    </div>
                    <small class="text-muted">已自动屏蔽 FedX 仓库。建议选择可读在线仓库。</small>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="selectAllFedxMembers()">
                        <i class="fas fa-check-double me-1"></i>全选
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="clearFedxMembers()">
                        <i class="fas fa-eraser me-1"></i>清空
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
