<section id="section-dashboard" class="section active">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="icon" style="background: rgba(79, 70, 229, 0.1); color: var(--primary);">
                <i class="fas fa-folder"></i>
            </div>
            <div class="value" id="stat-repos">-</div>
            <div class="label">仓库数量</div>
        </div>
        <div class="stat-card">
            <div class="icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="value" id="stat-triples">-</div>
            <div class="label">三元组总数</div>
        </div>
        <div class="stat-card">
            <div class="icon" style="background: rgba(245, 158, 11, 0.1); color: var(--warning);">
                <i class="fas fa-clock"></i>
            </div>
            <div class="value" id="stat-uptime">-</div>
            <div class="label">运行时间</div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-list me-2"></i>仓库列表</span>
                    <button class="btn btn-sm btn-primary" onclick="switchSection('repositories')">
                        <i class="fas fa-plus me-1"></i>管理
                    </button>
                </div>
                <div class="card-body">
                    <div id="dashboardRepoList">
                        <div class="text-center text-muted py-4">
                            <i class="fas fa-spinner fa-spin"></i> 加载中...
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-bolt me-2"></i>快速操作</span>
                </div>
                <div class="card-body">
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-success" onclick="switchSection('query')">
                            <i class="fas fa-search me-2"></i>SPARQL查询
                        </button>
                        <button class="btn btn-outline-warning" onclick="refreshAll()">
                            <i class="fas fa-sync-alt me-2"></i>刷新数据
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
