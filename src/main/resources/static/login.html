<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - GraphDB 管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f7fb; }
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .card { width: 100%; max-width: 420px; border: none; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="card">
        <div class="card-body p-4">
            <h4 class="mb-3"><i class="fas fa-lock me-2 text-primary"></i>登录系统</h4>
            <p class="text-muted mb-4">使用 GraphDB 账号登录；若 GraphDB 未开启鉴权，可直接进入。</p>

            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input id="username" class="form-control" placeholder="admin">
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input id="password" type="password" class="form-control" placeholder="root">
            </div>

            <div id="msg" class="alert alert-danger py-2" style="display:none;"></div>

            <div class="d-grid gap-2">
                <button class="btn btn-primary" onclick="login()">
                    <i class="fas fa-sign-in-alt me-2"></i>登录
                </button>
                <button class="btn btn-outline-secondary" onclick="noAuthLogin()">
                    <i class="fas fa-unlock me-2"></i>未开启鉴权，直接进入
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    fetch('/api/auth/status')
        .then(r => r.json())
        .then(data => {
            if (data && data.authenticated) {
                window.location.href = 'index.html';
            }
        })
        .catch(() => {});

    function showError(msg) {
        const el = document.getElementById('msg');
        el.textContent = msg || '登录失败';
        el.style.display = 'block';
    }

    function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
            showError('请输入用户名和密码');
            return;
        }
        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
            .then(r => r.json())
            .then(data => {
                if (data && data.success) {
                    window.location.href = 'index.html';
                    return;
                }
                showError((data && data.message) || '用户名或密码错误');
            })
            .catch(err => showError(err.message));
    }

    function noAuthLogin() {
        fetch('/api/auth/no-auth', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data && data.success) {
                    window.location.href = 'index.html';
                    return;
                }
                showError((data && data.message) || 'GraphDB 已开启鉴权，不能直接进入');
            })
            .catch(err => showError(err.message));
    }
</script>
</body>
</html>
