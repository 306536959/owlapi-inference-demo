<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphDB 知识图谱管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet">
</head>
<body>
    <div id="loadingOverlay" class="spinner-overlay" style="display: none;">
        <div class="text-center">
            <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
            <p class="text-muted">处理中...</p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div id="layout-sidebar"></div>

    <main class="main-content">
        <div id="layout-topbar"></div>
        <div id="layout-sections">
            <div class="card">
                <div class="card-body text-center text-muted py-5">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    正在加载界面…
                </div>
            </div>
        </div>
    </main>

    <div id="layout-modals"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app-state.js"></script>
    <script src="js/app-utils.js"></script>
    <script src="js/app-dashboard-repos.js"></script>
    <script src="js/app-fedx.js"></script>
    <script src="js/app-nav.js"></script>
    <script src="js/app-repo-modal.js"></script>
    <script src="js/app-repo-ontology.js"></script>
    <script src="js/app-repo-crud.js"></script>
    <script src="js/app-sparql.js"></script>
    <script src="js/app-auth.js"></script>
    <script src="js/app-layout.js"></script>
    <script src="js/app-main.js"></script>
</body>
</html>
